services:
  api:
    build:
      context: .
      dockerfile: ./serve/Dockerfile.prod
    expose:
      - "8000"  # internal only
    environment:
      - API_KEY=${API_KEY:-demo-key-12345}
    networks:
      - backend  # Only backend, not frontend

  prometheus:
    image: prom/prometheus
    expose:
      - "9090"  # Internal only - no ports section
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend

  grafana:
    image: grafana/grafana
    expose:
      - "3000"  # Internal only
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"  # public entry point
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - api

networks:
  frontend:  # Public-facing
  backend:   # Internal only