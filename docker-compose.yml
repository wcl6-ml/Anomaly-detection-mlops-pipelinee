# docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    environment:
      - API_KEY=${API_KEY} 
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      # Nginx handles the rest automatically
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
      # Add this line to remove the default conflict:
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - prometheus 
      - grafana 
  api:
    build:
      context: .
      dockerfile: ./serve/Dockerfile.prod
    expose:
      - "8000"
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://user:password@db:5432/monitoring_db # Add this
      - MODEL_PATH=/app/model_mnt
    volumes:    
      - ./logs:/app/logs
      - ./model_store/production/artifacts:/app/model_mnt:ro
    depends_on:
      - db # Ensure DB starts before the API

  prometheus:
    image: prom/prometheus
    expose:  # Only accessible from nginx
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:8000/prometheus/'
      - '--web.route-prefix=/'

  grafana:
    image: grafana/grafana
    expose:  # Only accessible from nginx
      - "3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
  db:
      image: postgres:15
      container_name: mlops_db
      restart: always
      environment:
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: monitoring_db
      expose:
        - "5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: